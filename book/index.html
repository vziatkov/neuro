<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple Book Viewer</title>
    <link rel="stylesheet" href="./book.css" />
  </head>
  <body>
    <div class="layout">
      <aside class="sidebar">
        <h1>Book</h1>
        <nav id="chapters-nav" aria-label="Chapters"></nav>
      </aside>

      <main class="content">
        <h2 id="chapter-title">Loading...</h2>
        <p id="chapter-subject" class="subject"></p>
        <article id="chapter-body"></article>
      </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="./book.js" type="module"></script>
  </body>
</html>
