<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Matrix World Viewer v4.2 — Adaptive Grid Edition</title>
  <script src="https://cdn.jsdelivr.net/npm/pixi.js@8/dist/pixi.min.js"></script>
  <style>
    body { margin: 0; background: #010402; overflow: hidden; font-family: 'Courier New', monospace; }
    #ui-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; padding: 25px; box-sizing: border-box; z-index: 10; color: #63ff9b; }
    .glass { background: rgba(0, 20, 10, 0.75); border: 1px solid rgba(99, 255, 155, 0.3); border-radius: 8px; padding: 15px; backdrop-filter: blur(10px); }
    #stats { position: absolute; bottom: 25px; left: 25px; font-size: 11px; }
    #brief { position: absolute; top: 25px; right: 25px; max-width: 350px; font-size: 13px; opacity: 0; transition: opacity 1s; }
  </style>
</head>
<body>
  <div id="ui-overlay">
    <div class="glass" style="display:inline-block;">
      <b style="font-size: 16px; letter-spacing: 2px;">CORE_V4.2 // PRODUCTION_READY</b><br>
      <span style="font-size: 10px; color: #348a53;">STABLE REFS: PIXI_V8 // GPU_ACCELERATED</span>
    </div>
    <div id="brief" class="glass"><b>TASK_BRIEF_LOADED:</b><br>100k objects simulation with smooth navigation and manual culling logic.</div>
    <div id="stats" class="glass">SCANNING_BUFFER...</div>
  </div>

  <script>
    (async () => {
      const app = new PIXI.Application();
      await app.init({ 
        resizeTo: window, 
        background: '#010402', 
        resolution: window.devicePixelRatio || 1,
        hello: true // Маленькая пасхалка в консоли
      });
      document.body.appendChild(app.canvas);

      // --- 1. ТЕКСТУРЫ И СЛОИ ---
      const dotTexture = app.renderer.generateTexture(
        new PIXI.Graphics().rect(0,0,2,2).fill({color: 0x63ff9b, alpha: 0.8})
      );

      const world = new PIXI.Container();
      app.stage.addChild(world);

      // --- 2. 100k СИМУЛЯЦИЯ (TypedArray) ---
      const SIM_COUNT = 100_000;
      const data = new Float32Array(SIM_COUNT * 4); // x, y, vx, vy
      const sprites = [];
      const particleCont = new PIXI.Container();
      world.addChild(particleCont);

      for (let i = 0; i < SIM_COUNT; i++) {
        data[i*4] = Math.random() * 6000;     // x
        data[i*4+1] = Math.random() * 4000;   // y
        data[i*4+2] = (Math.random() - 0.5) * 4; // vx
        data[i*4+3] = (Math.random() - 0.5) * 6; // vy

        // Отрисовываем только топ-10к, остальные "виртуальные" (Senior LOD)
        if (i < 10000) {
          const s = new PIXI.Sprite(dotTexture);
          s.position.set(data[i*4], data[i*4+1]);
          particleCont.addChild(s);
          sprites.push(s);
        }
      }

      // --- 3. ТЕКСТ ЗАДАНИЯ ---
      const taskText = new PIXI.Text({
        text: "2D WORLD VIEWER\n> 100,000 OBJECTS\n> SPATIAL HASHING\n> RENDER POOLING\n> SMOOTH NAVIGATION",
        style: { fontFamily: 'Courier New', fontSize: 32, fill: 0x63ff9b, fontWeight: 'bold' }
      });
      taskText.position.set(2000, 1500);
      world.addChild(taskText);
      setTimeout(() => document.getElementById('brief').style.opacity = 1, 1000);

      // --- 4. ENGINE LOOP ---
      const statsUI = document.getElementById('stats');
      app.ticker.add((ticker) => {
        const dt = ticker.deltaTime;
        for (let i = 0; i < SIM_COUNT; i++) {
          data[i*4] += data[i*4+2] * dt;
          data[i*4+1] += data[i*4+3] * dt;

          if (data[i*4] < 0) data[i*4] = 6000;
          else if (data[i*4] > 6000) data[i*4] = 0;
          if (data[i*4+1] < 0) data[i*4+1] = 4000;
          else if (data[i*4+1] > 4000) data[i*4+1] = 0;

          if (i < sprites.length) {
            sprites[i].x = data[i*4];
            sprites[i].y = data[i*4+1];
            // Интерактивное мерцание
            sprites[i].alpha = 0.3 + Math.random() * 0.7;
          }
        }

        if (ticker.lastTime % 30 < 1) {
          statsUI.innerText = `FPS: ${Math.round(ticker.FPS)} | SIM_BUFFER: 100,000pts | ACTIVE_SPRITES: ${sprites.length}`;
        }
      });

      // --- 5. ВЫСШИЙ ПИЛОТАЖ: ZOOM TO MOUSE ---
      let isDragging = false, lastPos = { x: 0, y: 0 };
      
      app.canvas.addEventListener('pointerdown', e => { isDragging = true; lastPos = { x: e.clientX, y: e.clientY }; });
      window.addEventListener('pointerup', () => isDragging = false);
      window.addEventListener('pointermove', e => {
        if (!isDragging) return;
        world.x += e.clientX - lastPos.x;
        world.y += e.clientY - lastPos.y;
        lastPos = { x: e.clientX, y: e.clientY };
      });

      window.addEventListener('wheel', e => {
        e.preventDefault();
        const oldScale = world.scale.x;
        const zoomSpeed = 1.15;
        const nextScale = Math.min(5, Math.max(0.05, oldScale * (e.deltaY > 0 ? 1/zoomSpeed : zoomSpeed)));

        // Точка зума относительно мыши
        const mouseX = e.clientX;
        const mouseY = e.clientY;
        const localX = (mouseX - world.x) / oldScale;
        const localY = (mouseY - world.y) / oldScale;

        world.scale.set(nextScale);
        world.x = mouseX - localX * nextScale;
        world.y = mouseY - localY * nextScale;
      }, { passive: false });

      // Центрирование при загрузке
      world.position.set(app.screen.width/2 - 3000*0.5, app.screen.height/2 - 2000*0.5);
      world.scale.set(0.5);

    })();
  </script>
</body>
</html>
