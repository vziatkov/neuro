<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEURO — FIELD v1.0</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;500&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #020203; overflow: hidden; font-family: 'JetBrains Mono', monospace; cursor: crosshair; }
        #ui-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; padding: 30px; color: rgba(255,255,255,0.4); font-size: 10px; display: flex; flex-direction: column; justify-content: space-between; text-transform: uppercase; letter-spacing: 2px; }
        #status { color: #50fa7b; text-shadow: 0 0 10px rgba(80, 250, 123, 0.5); }
        #center-msg { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #fff; font-size: 14px; opacity: 0; transition: all 2s ease; letter-spacing: 5px; text-align: center; }
        #center-msg.active { opacity: 0.7; letter-spacing: 8px; }
    </style>
</head>
<body>

<div id="ui-layer">
    <div>NEURO / OBSERVATORY — V1.0<br><span id="status">● SYSTEM ACTIVE</span></div>
    <div id="stats">TRAJECTORY_COUNT: 0<br>FIELD_DENSITY: 0.00%</div>
</div>

<div id="center-msg">SELF-OBSERVATION INITIATED</div>

<script src="https://unpkg.com/pixi.js@8.x/dist/pixi.min.js"></script>

<script>
(async () => {
    const app = new PIXI.Application();
    await app.init({ 
        resizeTo: window, 
        backgroundColor: 0x020203, 
        antialias: true,
        resolution: window.devicePixelRatio || 1
    });
    document.body.appendChild(app.canvas);

    const graphics = new PIXI.Graphics();
    app.stage.addChild(graphics);

    let points = [];
    const maxPoints = 150;
    let frameCount = 0;
    let isActivated = false;

    // Сетка фона (статичные точки)
    const bgDots = new PIXI.Graphics();
    for(let i=0; i<200; i++) {
        bgDots.circle(Math.random() * innerWidth, Math.random() * innerHeight, 0.8).fill({color: 0xffffff, alpha: 0.1});
    }
    app.stage.addChild(bgDots);

    window.addEventListener('pointermove', (e) => {
        points.push({ x: e.clientX, y: e.clientY, alpha: 1, age: 0 });
        if (points.length > maxPoints) points.shift();
        
        // Обновление UI
        document.getElementById('stats').innerHTML = `TRAJECTORY_COUNT: ${points.length}<br>FIELD_DENSITY: ${(points.length/maxPoints * 100).toFixed(2)}%`;
    });

    app.ticker.add((time) => {
        frameCount += time.deltaTime;
        graphics.clear();

        // Отрисовка линий (траекторий)
        if (points.length > 1) {
            for (let i = 1; i < points.length; i++) {
                const p1 = points[i-1];
                const p2 = points[i];
                
                // Эффект затухания
                p1.alpha *= 0.97;
                p1.age += 0.01;

                graphics.moveTo(p1.x, p1.y);
                graphics.lineTo(p2.x, p2.y);
                
                // Цвет "Нейро" (оранжево-золотой из твоего референса)
                graphics.stroke({ 
                    width: 1.5 * p1.alpha, 
                    color: 0xffa500, 
                    alpha: p1.alpha * 0.5 
                });

                // Тонкие связи (паутина)
                if (i % 10 === 0 && p1.alpha > 0.5) {
                    graphics.circle(p1.x, p1.y, 2).fill({color: 0xffffff, alpha: p1.alpha * 0.2});
                }
            }
        }

        // Удаление совсем прозрачных точек
        points = points.filter(p => p.alpha > 0.01);

        // Триггер Фазы 2 (через ~8 секунд)
        if (frameCount > 500 && !isActivated) {
            isActivated = true;
            document.getElementById('center-msg').classList.add('active');
            document.getElementById('status').innerText = '● OBSERVING ITSELF';
            document.getElementById('status').style.color = '#ff8c42';
        }
    });

    window.addEventListener('resize', () => app.renderer.resize(innerWidth, innerHeight));
})();
</script>
</body>
</html>
