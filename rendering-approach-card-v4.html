<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Pixi — Particle Field (v4)</title>
  <style>
    html, body { margin: 0; height: 100%; overflow: hidden; background: #050508; }
    canvas { display: block; }
  </style>
</head>
<body>
<script src="https://cdn.jsdelivr.net/npm/pixi.js@8/dist/pixi.min.js"></script>
<script>
  (async () => {
    const { Application, ParticleContainer, Sprite, Texture } = PIXI;
    // Pixi blend mode constants may differ by build; keep it robust.
    // Some builds may not expose BLEND_MODES enum as expected.
    let ADD_MODE = 1; // typical fallback
    if (PIXI.BLEND_MODES && typeof PIXI.BLEND_MODES.ADD === 'number') ADD_MODE = PIXI.BLEND_MODES.ADD;
    else ADD_MODE = 'add';

    const app = new Application();
    await app.init({ resizeTo: window, background: "#050508" });
    document.body.appendChild(app.canvas);

    // --- soft glow texture (tiny canvas -> cheap) ---
    const tex = (function makeGlowTex(size = 32) {
      const c = document.createElement("canvas");
      c.width = c.height = size;
      const ctx = c.getContext("2d");
      const r = size / 2;
      const g = ctx.createRadialGradient(r, r, 2, r, r, r);
      g.addColorStop(0, "rgba(255, 255, 255, 1)");
      g.addColorStop(1, "rgba(255, 255, 255, 0)");
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.arc(r, r, r, 0, Math.PI * 2);
      ctx.fill();
      return Texture.from(c);
    })();

    // --- particle pool ---
    const MAX = 1800;
    const pc = new ParticleContainer(MAX, { position: true, scale: true, alpha: true });
    pc.blendMode = ADD_MODE;
    app.stage.addChild(pc);

    const pool = new Array(MAX).fill(0).map(() => {
      const s = new Sprite(tex);
      s.anchor.set(0.5);
      // Pooling: keep it in container; only drive alpha for activation.
      s.alpha = 0;
      s.x = -9999;
      s.y = -9999;
      s.visible = true;
      s.blendMode = ADD_MODE;
      pc.addChild(s);
      return { s, active: false, x: 0, y: 0, vx: 0, vy: 0, life: 0, ttl: 1, a0: 0 };
    });

    function rand(a, b) { return a + Math.random() * (b - a); }
    function getFree() {
      for (let i = 0; i < pool.length; i++) if (!pool[i].active) return pool[i];
      return null;
    }

    const spawnFrom = { x: null, y: null, aliveMs: 0 };
    app.canvas.addEventListener("pointermove", (e) => {
      const rect = app.canvas.getBoundingClientRect();
      spawnFrom.x = (e.clientX - rect.left) / rect.width * app.screen.width;
      spawnFrom.y = (e.clientY - rect.top) / rect.height * app.screen.height;
      spawnFrom.aliveMs = performance.now();
    }, { passive: true });

    function spawn(x, y) {
      const p = getFree();
      if (!p) return;

      p.active = true;
      p.life = 0;
      p.ttl = rand(0.9, 2.4);

      p.x = x;
      p.y = y;
      p.vx = rand(-90, 90);
      p.vy = rand(-90, 90);

      const a0 = rand(0.65, 1.05);
      const sc = rand(0.3, 0.9);

      p.a0 = a0;
      p.s.alpha = a0;
      p.s.scale.set(sc, sc);
      // Slight variety around the "ember" palette.
      p.s.tint = (Math.random() < 0.18) ? 0x66ccff : 0xffa366;

      p.s.x = p.x;
      p.s.y = p.y;
    }

    function spawnBurstAt(x, y, count) {
      for (let i = 0; i < count; i++) {
        spawn(x + rand(-10, 10), y + rand(-10, 10));
      }
    }

    // Initial population so it isn't empty on load.
    for (let i = 0; i < 800; i++) spawnBurstAt(app.screen.width * 0.5, app.screen.height * 0.55, 1);

    let last = performance.now();
    app.ticker.add(() => {
      const now = performance.now();
      const dt = Math.min(0.05, (now - last) / 1000);
      last = now;

      // Ambient drift + pointer bursts.
      const recentPointer = spawnFrom.x !== null && (now - spawnFrom.aliveMs) < 120;
      if (recentPointer) {
        spawnBurstAt(spawnFrom.x, spawnFrom.y, 10);
      } else if (Math.random() < 0.25) {
        spawnBurstAt(rand(0, app.screen.width), app.screen.height * 0.9, 3);
      }

      // Update particles.
      for (let i = 0; i < pool.length; i++) {
        const p = pool[i];
        if (!p.active) continue;

        p.life += dt;
        const t = p.life / p.ttl;
        if (t >= 1) {
          p.active = false;
          p.s.alpha = 0;
          continue;
        }

        // Motion: damping + slight noise.
        p.vx *= 0.985;
        p.vy *= 0.985;
        p.vx += rand(-35, 35) * dt;
        p.vy += rand(-35, 35) * dt;

        p.x += p.vx * dt;
        p.y += p.vy * dt;

        p.s.x = p.x;
        p.s.y = p.y;
        // Fade from the initial alpha; do NOT multiply accumulated alpha.
        p.s.alpha = p.a0 * (1 - t);
      }
    });
  })();
</script>
</body>
</html>
