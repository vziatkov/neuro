<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Procedural MMO Map — No server</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        html,body{height:100%;overflow:hidden;background:#050508;color:#e5e5e5;font-family:'JetBrains Mono',monospace}
        body{display:flex;flex-direction:column;align-items:center;min-height:0;padding:12px 16px}
        .header{flex-shrink:0;margin-bottom:8px;text-align:center;max-width:720px}
        .header h1{font-size:14px;font-weight:600;letter-spacing:2px;color:rgba(255,255,255,0.9)}
        .header .sub{font-size:10px;color:rgba(255,140,66,0.5);margin-top:4px}
        .world-info{flex-shrink:0;background:#0d0d0f;border:1px solid #1a1a1a;border-radius:8px;padding:10px 16px;margin-bottom:10px;text-align:center;max-width:720px;width:100%;display:flex;flex-wrap:wrap;justify-content:center;gap:20px;align-items:center}
        .world-info .label{font-size:9px;color:#555;text-transform:uppercase;letter-spacing:1px}
        .world-info .seed{font-size:16px;font-weight:600;color:#ff8c42;letter-spacing:2px}
        .world-info .coords{font-size:11px;color:#666}
        .world-info .coords span{color:#888}
        .map-wrap{flex:1;min-height:0;min-width:0;width:100%;max-width:800px;position:relative;border-radius:12px;overflow:hidden;border:1px solid #1a1a1a;box-shadow:0 0 0 1px rgba(0,0,0,0.3),0 8px 32px rgba(0,0,0,0.4);display:flex;align-items:stretch;justify-content:stretch}
        .map-wrap canvas{display:block;width:100%;height:100%}
        .map-hint{flex-shrink:0;font-size:9px;color:#444;text-align:center;margin-top:6px;letter-spacing:0.5px}
        .joystick-wrap{flex-shrink:0;margin-top:8px;display:flex;justify-content:center;align-items:center;touch-action:none;user-select:none;-webkit-user-select:none}
        .joystick-base{position:relative;width:96px;height:96px;min-width:96px;min-height:96px;border-radius:50%;background:radial-gradient(circle at 30% 25%,rgba(255,140,66,0.2),transparent 55%),radial-gradient(circle at 70% 75%,rgba(0,0,0,0.6),#050508);border:1px solid rgba(255,140,66,0.3);box-shadow:0 0 0 1px rgba(0,0,0,0.6),0 10px 30px rgba(0,0,0,0.6);touch-action:none;user-select:none;-webkit-user-select:none;-webkit-tap-highlight-color:transparent}
        .joystick-ring{position:absolute;inset:10px;border-radius:50%;border:1px dashed rgba(255,140,66,0.25);pointer-events:none}
        .joystick-dot{position:absolute;left:50%;top:50%;width:40px;height:40px;min-width:40px;min-height:40px;border-radius:50%;background:radial-gradient(circle at 30% 25%,#ffb876,#ff8c42);border:1px solid rgba(255,200,150,0.8);box-shadow:0 0 0 1px rgba(0,0,0,0.6),0 8px 20px rgba(255,120,50,0.4);transform:translate(-50%,-50%);transition:transform 0.08s ease-out;pointer-events:none}
        .joystick-base.active .joystick-dot{transition:none}
        @media (hover:none) and (pointer:coarse){
            .joystick-base{width:112px;height:112px;min-width:112px;min-height:112px}
            .joystick-dot{width:48px;height:48px;min-width:48px;min-height:48px}
        }
        .back{flex-shrink:0;display:inline-block;margin-top:10px;font-size:10px;color:rgba(255,255,255,0.2);text-decoration:none;transition:color 0.2s}
        .back:hover{color:rgba(255,140,66,0.8)}
    </style>
</head>
<body>
    <div class="header">
        <h1>Procedural MMO Map</h1>
        <div class="sub">World = f(seed, x, y) · Value noise → height · No server · Same link = same infinite map</div>
    </div>

    <div class="world-info">
        <div>
            <div class="label">World seed</div>
            <div class="seed" id="worldSeed">—</div>
        </div>
        <div>
            <div class="label">Position</div>
            <div class="coords" id="coords">x: <span id="px">0</span> · y: <span id="py">0</span></div>
        </div>
    </div>

    <div class="map-wrap">
        <canvas id="canvas"></canvas>
    </div>
    <div class="map-hint">Drag the joystick to move · Map is infinite and identical for everyone with the same URL</div>

    <div class="joystick-wrap">
        <div class="joystick-base" id="joyBase">
            <div class="joystick-ring"></div>
            <div class="joystick-dot" id="joyDot"></div>
        </div>
    </div>

    <a href="dice-room.html" class="back">← Dice Room</a>

    <script>
    (function(){
        var seed=location.hash.slice(1)||'world';
        document.getElementById('worldSeed').textContent=seed||'world';

        var TILE=32;
        var VIEW_X=14;
        var VIEW_Y=11;
        var canvas=document.getElementById('canvas');
        var ctx=canvas.getContext('2d');
        var playerX=0;
        var playerY=0;
        var mapWrap=document.querySelector('.map-wrap');

        function resizeCanvas(){
            var w=mapWrap.clientWidth;
            var h=mapWrap.clientHeight;
            if(w<=0||h<=0)return;
            if(canvas.width!==w||canvas.height!==h){
                canvas.width=w;
                canvas.height=h;
                VIEW_X=Math.ceil(w/TILE/2)+1;
                VIEW_Y=Math.ceil(h/TILE/2)+1;
            }
        }
        resizeCanvas();
        window.addEventListener('resize',resizeCanvas);

        function hash(s){
            var h=0;
            for(var i=0;i<s.length;i++){
                h=((h<<5)-h+s.charCodeAt(i))|0;
            }
            return Math.abs(h);
        }
        function rng(seed){
            var x=Math.sin(seed)*10000;
            return x-Math.floor(x);
        }
        var NOISE_SCALE=0.045;
        function noise2d(wx,wy){
            var fx=wx*NOISE_SCALE;
            var fy=wy*NOISE_SCALE;
            var ix=Math.floor(fx);
            var iy=Math.floor(fy);
            var tx=fx-ix;
            var ty=fy-iy;
            tx=tx*tx*(3-2*tx);
            ty=ty*ty*(3-2*ty);
            var n00=rng(hash(seed+'n:'+ix+':'+iy));
            var n10=rng(hash(seed+'n:'+(ix+1)+':'+iy));
            var n01=rng(hash(seed+'n:'+ix+':'+(iy+1)));
            var n11=rng(hash(seed+'n:'+(ix+1)+':'+(iy+1)));
            var nx0=n00+(n10-n00)*tx;
            var nx1=n01+(n11-n01)*tx;
            return nx0+(nx1-nx0)*ty;
        }
        function tileType(wx,wy){
            var h=noise2d(wx,wy);
            if(h<0.3)return 'water';
            if(h<0.45)return 'sand';
            if(h<0.72)return 'grass';
            return 'mountain';
        }

        function drawTile(type,sx,sy){
            var pad=1;
            var x=sx+pad;
            var y=sy+pad;
            var w=TILE-pad*2;
            var h=TILE-pad*2;
            var r=4;
            ctx.beginPath();
            ctx.moveTo(x+r,y);
            ctx.lineTo(x+w-r,y);
            ctx.quadraticCurveTo(x+w,y,x+w,y+r);
            ctx.lineTo(x+w,y+h-r);
            ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
            ctx.lineTo(x+r,y+h);
            ctx.quadraticCurveTo(x,y+h,x,y+h-r);
            ctx.lineTo(x,y+r);
            ctx.quadraticCurveTo(x,y,x+r,y);
            ctx.closePath();

            if(type==='water'){
                var g=ctx.createLinearGradient(x,y,x+w,y+h);
                g.addColorStop(0,'#1a4a8e');
                g.addColorStop(0.5,'#2060c0');
                g.addColorStop(1,'#0f2d52');
                ctx.fillStyle=g;
                ctx.fill();
                ctx.strokeStyle='rgba(80,140,220,0.25)';
                ctx.lineWidth=0.8;
                ctx.stroke();
            }else if(type==='sand'){
                var g=ctx.createLinearGradient(x,y,x+w,y+h);
                g.addColorStop(0,'#c9a84a');
                g.addColorStop(0.5,'#d4b55a');
                g.addColorStop(1,'#a88a38');
                ctx.fillStyle=g;
                ctx.fill();
                ctx.strokeStyle='rgba(180,150,80,0.35)';
                ctx.lineWidth=0.6;
                ctx.stroke();
            }else if(type==='grass'){
                var g=ctx.createLinearGradient(x,y,x+w,y+h);
                g.addColorStop(0,'#2d7a3e');
                g.addColorStop(0.5,'#38a04a');
                g.addColorStop(1,'#1e5c2a');
                ctx.fillStyle=g;
                ctx.fill();
                ctx.strokeStyle='rgba(60,120,70,0.3)';
                ctx.lineWidth=0.6;
                ctx.stroke();
            }else{
                var g=ctx.createLinearGradient(x,y,x+w,y+h);
                g.addColorStop(0,'#5a5a5a');
                g.addColorStop(0.4,'#6a6a6a');
                g.addColorStop(0.7,'#4a4a4a');
                g.addColorStop(1,'#3a3a3a');
                ctx.fillStyle=g;
                ctx.fill();
                ctx.strokeStyle='rgba(100,100,100,0.4)';
                ctx.lineWidth=0.8;
                ctx.stroke();
            }
        }

        function drawWorld(){
            var cw=canvas.width;
            var ch=canvas.height;
            var ox=cw/2-TILE/2;
            var oy=ch/2-TILE/2;

            ctx.fillStyle='#0a0a0c';
            ctx.fillRect(0,0,cw,ch);

            for(var dy=-VIEW_Y;dy<=VIEW_Y;dy++){
                for(var dx=-VIEW_X;dx<=VIEW_X;dx++){
                    var wx=playerX+dx;
                    var wy=playerY+dy;
                    var type=tileType(wx,wy);
                    var sx=ox+dx*TILE;
                    var sy=oy+dy*TILE;
                    if(sx>-TILE&&sx<cw+TILE&&sy>-TILE&&sy<ch+TILE)
                        drawTile(type,sx,sy);
                }
            }

            var px=cw/2;
            var py=ch/2;
            ctx.shadowColor='rgba(255,140,66,0.6)';
            ctx.shadowBlur=14;
            ctx.fillStyle='#ff8c42';
            ctx.beginPath();
            ctx.arc(px,py,8,0,Math.PI*2);
            ctx.fill();
            ctx.shadowBlur=0;
            ctx.strokeStyle='rgba(255,200,150,0.5)';
            ctx.lineWidth=1.5;
            ctx.stroke();
            ctx.fillStyle='rgba(255,255,255,0.9)';
            ctx.beginPath();
            ctx.arc(px-3,py-3,2.5,0,Math.PI*2);
            ctx.fill();
        }

        // Joystick-driven movement (no keyboard)
        var joyBase=document.getElementById('joyBase');
        var joyDot=document.getElementById('joyDot');
        var joyActive=false;
        var activePointerId=null; // only this pointer drives the joystick; when it goes up, we reset
        var joyRadius=40;
        var joyVX=0;
        var joyVY=0;
        var joyMag=0;

        function resetJoystick(){
            var pid=activePointerId;
            joyVX=0;joyVY=0;joyMag=0;
            joyActive=false;
            activePointerId=null;
            joyBase.classList.remove('active');
            joyDot.style.transform='translate(-50%,-50%)';
            try{if(pid!=null)joyBase.releasePointerCapture(pid);}catch(_){}
        }

        function handleJoyPointer(e){
            if(!joyActive||e.pointerId!==activePointerId)return;
            var rect=joyBase.getBoundingClientRect();
            var cx=rect.left+rect.width/2;
            var cy=rect.top+rect.height/2;
            var dx=e.clientX-cx;
            var dy=e.clientY-cy;
            var dist=Math.sqrt(dx*dx+dy*dy)||0.0001;
            var r=Math.min(rect.width,rect.height)/2-16;
            if(r<8)r=joyRadius;
            var clamped=Math.min(dist,r);
            var nx=dx/dist;
            var ny=dy/dist;
            var px=nx*clamped;
            var py=ny*clamped;
            joyDot.style.transform='translate('+(px)+'px,'+(py)+'px) translate(-50%,-50%)';
            joyVX=nx;
            joyVY=ny;
            joyMag=clamped/r;
        }

        function endJoy(e){
            if(!joyActive)return;
            if(e&&e.pointerId!==activePointerId)return;
            joyActive=false;
            var pid=activePointerId;
            activePointerId=null;
            try{if(pid!=null)joyBase.releasePointerCapture(pid);}catch(_){}
            joyVX=0;joyVY=0;joyMag=0;
            joyBase.classList.remove('active');
            joyDot.style.transform='translate(-50%,-50%)';
        }

        joyBase.addEventListener('pointerdown',function(e){
            if(joyActive)return;
            e.preventDefault();
            joyActive=true;
            activePointerId=e.pointerId;
            try{joyBase.setPointerCapture(e.pointerId);}catch(_){}
            joyBase.classList.add('active');
            handleJoyPointer(e);
        });
        joyBase.addEventListener('pointermove',function(e){
            handleJoyPointer(e);
        });
        joyBase.addEventListener('pointerup',endJoy);
        joyBase.addEventListener('pointercancel',endJoy);
        joyBase.addEventListener('pointerleave',function(e){
            if(!joyActive)resetJoystick();
        });

        // Safety: when the finger/mouse that controls the joystick goes up anywhere (e.g. outside element), stop
        document.addEventListener('pointerup',function(e){
            if(joyActive&&e.pointerId===activePointerId)endJoy(e);
        });
        document.addEventListener('pointercancel',function(e){
            if(joyActive&&e.pointerId===activePointerId)endJoy(e);
        });
        window.addEventListener('blur',function(){ resetJoystick(); });
        window.addEventListener('visibilitychange',function(){ if(document.hidden)resetJoystick(); });

        var lastTime=null;
        var SPEED=5; // tiles per second at full deflection
        function loop(now){
            resizeCanvas();
            if(typeof now!=='number')now=performance.now();
            if(lastTime===null)lastTime=now;
            var dt=(now-lastTime)/1000;
            lastTime=now;

            // Update position from joystick vector
            if(joyMag>0.001){
                playerX+=joyVX*joyMag*SPEED*dt;
                playerY+=joyVY*joyMag*SPEED*dt;
            }

            drawWorld();
            document.getElementById('px').textContent=playerX.toFixed(1);
            document.getElementById('py').textContent=playerY.toFixed(1);
            requestAnimationFrame(loop);
        }
        requestAnimationFrame(loop);
    })();
    </script>
</body>
</html>
