<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Pixi Demo — Final</title>
  <style>
    body { margin:0; background:#050508; overflow:hidden; font-family: monospace; }

    .panel {
      position: absolute;
      top: 20px;
      width: 260px;
      color: #ddd;
      font-size: 12px;
      line-height: 1.4;
      opacity: 0.85;
    }

    .left { left: 16px; }
    .right { right: 16px; }

    .title { color:#fff; margin-bottom:8px; }
    .accent { color:#ff8c42; }
  </style>
</head>
<body>

<div class="panel left">
  <div class="title">Task</div>
  <div>Large <span class="accent">2D world</span></div>
  <div>Render only <span class="accent">visible objects</span></div>
  <div>Smooth <span class="accent">navigation</span></div>
  <div>No full scene instantiation</div>
</div>

<div class="panel right">
  <div class="title">Solution</div>
  <div>World = <span class="accent">data layer</span></div>
  <div>Render = <span class="accent">projection</span></div>
  <div>Lifecycle-driven objects</div>
  <div>Scalable architecture</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/pixi.js@8/dist/pixi.min.js"></script>

<script>
(async () => {
  const app = new PIXI.Application();
  await app.init({ resizeTo: window, background: "#050508" });
  document.body.appendChild(app.canvas);

  const waterY = () => app.renderer.height * 0.72;

  const water = new PIXI.Graphics();
  app.stage.addChild(water);

  const particles = [];
  const ripples = [];

  function spawnParticle(x = Math.random() * app.renderer.width) {
    const g = new PIXI.Graphics()
      .circle(0, 0, 2 + Math.random()*3)
      .fill(0xffa366);

    const h = app.renderer.height;

    g.x = x;
    g.y = h + 30;

    g.vy = -(1.5 + Math.random()*1.5) * (h / 700);
    g.vx = (Math.random() - 0.5) * 0.6;

    g.life = 1.2;
    g.hit = false;

    app.stage.addChild(g);
    particles.push(g);
  }

  function spawnRipple(x) {
    const r = new PIXI.Graphics();
    r.x = x;
    r.y = waterY();
    r.radius = 2;
    r.alpha = 0.5;
    app.stage.addChild(r);
    ripples.push(r);
  }

  function drawWater(time) {
    const yBase = waterY();

    water.clear();
    water.moveTo(0, yBase);

    for (let x = 0; x <= app.renderer.width; x += 16) {
      const y = yBase + Math.sin(x * 0.02 + time) * 4;
      water.lineTo(x, y);
    }

    water.lineTo(app.renderer.width, app.renderer.height);
    water.lineTo(0, app.renderer.height);
    water.closePath();
    water.fill(0x0a1a22, 0.92);
  }

  // старт
  for (let i = 0; i < 60; i++) spawnParticle();

  // интеракция
  app.canvas.addEventListener("pointermove", (e) => {
    const rect = app.canvas.getBoundingClientRect();
    const x = e.clientX - rect.left;

    for (let i = 0; i < 3; i++) spawnParticle(x);
  });

  app.ticker.add(() => {
    const time = performance.now() * 0.002;

    drawWater(time);

    // интенсивность
    for (let i = 0; i < 2; i++) {
      if (Math.random() < 0.6) spawnParticle();
    }

    // частицы
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];

      p.x += p.vx;
      p.y += p.vy;
      p.alpha = p.life;

      p.life -= 0.008;

      if (p.y <= waterY() && !p.hit) {
        p.hit = true;
        spawnRipple(p.x);
      }

      if (p.life <= 0 || p.y < -20) {
        app.stage.removeChild(p);
        particles.splice(i, 1);
      }
    }

    // круги
    for (let i = ripples.length - 1; i >= 0; i--) {
      const r = ripples[i];

      r.clear();
      r.circle(0, 0, r.radius).stroke({ width: 1, color: 0x66ccff });

      r.radius += 0.6;
      r.alpha -= 0.015;

      if (r.alpha <= 0) {
        app.stage.removeChild(r);
        ripples.splice(i, 1);
      }
    }
  });

})();
</script>

</body>
</html>
